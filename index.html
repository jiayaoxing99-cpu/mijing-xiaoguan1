<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>谜境小馆</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div id="homePage" class="page active">
            <div class="home-content">
                <div class="logo-area">
                    <div class="logo-circle">
                        <span class="logo-text">谜</span>
                    </div>
                    <h1>谜境小馆</h1>
                    <p class="slogan">一盏清茶，几道谜题，静候君来</p>
                </div>
                
                <div class="rules-card">
                    <h3>📜 游戏玩法</h3>
                    <ul>
                        <li>选择难度开始挑战</li>
                        <li>每题答对得10分</li>
                        <li>可查看2条提示，每条扣2分</li>
                        <li>可跳过题目，不得分</li>
                        <li>完成所有题目后查看成绩</li>
                    </ul>
                </div>

                <div class="high-score">
                    <span class="high-score-label">🏆 历史最高分</span>
                    <span class="high-score-value" id="highScore">0</span>
                </div>

                <button class="start-btn" id="startBtn">开始挑战</button>
            </div>
        </div>

        <div id="difficultyPage" class="page">
            <div class="difficulty-content">
                <h2>选择难度</h2>
                <p class="sub-text">请选择您想要挑战的难度等级</p>
                
                <div class="difficulty-grid">
                    <button class="diff-btn easy" data-level="easy">
                        <div class="diff-icon">🌱</div>
                        <div class="diff-name">简单</div>
                        <div class="diff-desc">10道入门谜题</div>
                    </button>
                    <button class="diff-btn medium" data-level="medium">
                        <div class="diff-icon">🌿</div>
                        <div class="diff-name">中等</div>
                        <div class="diff-desc">10道进阶谜题</div>
                    </button>
                    <button class="diff-btn hard" data-level="hard">
                        <div class="diff-icon">🌳</div>
                        <div class="diff-name">困难</div>
                        <div class="diff-desc">10道高手谜题</div>
                    </button>
                    <button class="diff-btn mixed" data-level="mixed">
                        <div class="diff-icon">🎯</div>
                        <div class="diff-name">混合挑战</div>
                        <div class="diff-desc">随机混合10题</div>
                    </button>
                </div>

                <button class="back-btn" id="backToHome">返回</button>
            </div>
        </div>

        <div id="gamePage" class="page">
            <div class="game-content">
                <div class="game-header">
                    <button class="back-btn small" id="gameBackBtn">返回</button>
                    <div class="game-stats">
                        <span class="stat-item">
                            <span class="stat-label">关卡</span>
                            <span class="stat-value" id="currentLevel">1</span>/<span id="totalLevels">10</span>
                        </span>
                        <span class="stat-item">
                            <span class="stat-label">分数</span>
                            <span class="stat-value" id="score">0</span>
                        </span>
                        <span class="stat-item">
                            <span class="stat-label">难度</span>
                            <span class="stat-value" id="difficultyTag">简单</span>
                        </span>
                    </div>
                </div>

                <div class="progress-bar">
                    <div class="progress-fill" id="progressFill"></div>
                </div>

                <div class="riddle-card" id="riddleCard">
                    <div class="card-header">
                        <span class="category-badge" id="categoryBadge">字谜</span>
                        <span class="hints-remaining">提示: <span id="hintsLeft">2</span>/2</span>
                    </div>
                    <div class="riddle-question" id="riddleQuestion">谜面加载中...</div>
                </div>

                <div class="explanation-area" id="explanationArea">
                    <div class="explanation-box">
                        <p class="explanation-title">答案解析</p>
                        <p class="explanation-text" id="explanationText"></p>
                    </div>
                </div>

                <div class="input-area">
                    <input type="text" id="answerInput" placeholder="请输入您的答案..." autocomplete="off">
                    <button class="submit-btn" id="submitBtn">提交答案</button>
                </div>

                <div class="feedback" id="feedback"></div>

                <div class="action-buttons">
                    <button class="hint-btn" id="hintBtn">
                        <span class="btn-icon">💡</span>
                        <span>获取提示 (-2分)</span>
                    </button>
                    <button class="skip-btn" id="skipBtn">
                        <span class="btn-icon">➡️</span>
                        <span>跳过此题</span>
                    </button>
                </div>

                <div class="hint-display" id="hintDisplay">
                    <p class="hint-title">提示</p>
                    <p class="hint-content" id="hintContent"></p>
                </div>
            </div>
        </div>

        <div id="resultPage" class="page">
            <div class="result-content">
                <div class="result-header">
                    <div class="title-icon" id="titleIcon">🏆</div>
                    <h2 id="resultTitle">恭喜通关！</h2>
                </div>

                <div class="result-stats">
                    <div class="stat-card">
                        <span class="stat-num" id="finalScore">0</span>
                        <span class="stat-name">总分</span>
                    </div>
                    <div class="stat-card">
                        <span class="stat-num" id="correctCount">0</span>
                        <span class="stat-name">答对</span>
                    </div>
                    <div class="stat-card">
                        <span class="stat-num" id="timeTaken">0</span>
                        <span class="stat-name">用时</span>
                    </div>
                </div>

                <div class="title-card" id="titleCard">
                    <span class="title-badge" id="titleBadge">谜语新手</span>
                    <p class="title-desc" id="titleDesc">初入谜境，继续加油！</p>
                </div>

                <div class="new-record" id="newRecord" style="display: none;">
                    🎉 新纪录！
                </div>

                <div class="result-buttons">
                    <button class="action-btn primary" id="restartBtn">再来一局</button>
                    <button class="action-btn secondary" id="copyBtn">复制成绩</button>
                    <button class="action-btn outline" id="homeBtn">返回首页</button>
                </div>

                <div class="copy-feedback" id="copyFeedback">成绩已复制！</div>
            </div>
        </div>
    </div>

    <script src="riddles.js"></script>
    <script src="app.js"></script>
</body>
</html>
